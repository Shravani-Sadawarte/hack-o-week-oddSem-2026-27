<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Departures — Shortener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board-bg:#12161c;
    --panel:#1b212a;
    --panel-edge:#262e3a;
    --flap-amber:#ffb020;
    --flap-amber-dim:#7a5a1a;
    --teal:#4fd1c5;
    --text:#cdd3dc;
    --text-dim:#7d8794;
    --danger:#e5533d;
    --mono:'JetBrains Mono','IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top, #1a2029 0%, var(--board-bg) 55%);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:48px 20px 80px;
  }
  .wrap{max-width:820px;margin:0 auto;}

  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.22em;
    color:var(--flap-amber);
    text-transform:uppercase;
    margin:0 0 10px;
  }
  h1{
    font-family:var(--sans);
    font-weight:700;
    font-size:clamp(28px,4.5vw,42px);
    line-height:1.15;
    margin:0 0 8px;
    color:#f1f3f6;
  }
  .sub{color:var(--text-dim);margin:0 0 36px;font-size:15px;max-width:52ch;}

  /* ---- Departure board panel ---- */
  .board{
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:10px;
    padding:26px 24px;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.02);
  }
  .board-label{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:14px;
    display:flex;
    justify-content:space-between;
  }
  .board-label span:last-child{color:var(--teal);}

  .row-form{display:flex;gap:10px;flex-wrap:wrap;}
  input[type=text]{
    flex:1 1 320px;
    background:#0f1319;
    border:1px solid var(--panel-edge);
    color:var(--text);
    font-family:var(--mono);
    font-size:14px;
    padding:14px 16px;
    border-radius:6px;
    outline:none;
    transition:border-color .15s;
  }
  input[type=text]:focus{border-color:var(--flap-amber);}
  input[type=text]::placeholder{color:#525b68;}

  button{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:6px;
    border:none;
    transition:transform .1s, filter .15s;
  }
  button:active{transform:scale(.97);}

  .depart-btn{
    background:var(--flap-amber);
    color:#1a1305;
    font-weight:700;
    padding:14px 22px;
  }
  .depart-btn:hover{filter:brightness(1.08);}
  .depart-btn:disabled{background:#4b4536;color:#8a8478;cursor:wait;}

  .status-line{
    margin-top:12px;
    font-family:var(--mono);
    font-size:12.5px;
    min-height:18px;
  }
  .status-line.ok{color:var(--teal);}
  .status-line.err{color:var(--danger);}

  /* ---- Flap reveal ---- */
  .reveal{
    margin-top:22px;
    display:none;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }
  .reveal.show{display:flex;}
  .gate-label{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:.14em;
    text-transform:uppercase;
  }
  .flaps{display:flex;gap:4px;}
  .flap{
    width:30px;height:40px;
    background:#0f1319;
    border:1px solid var(--panel-edge);
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);
    font-size:19px;
    font-weight:700;
    color:var(--flap-amber);
    position:relative;
    overflow:hidden;
  }
  .flap::after{
    content:"";
    position:absolute;left:0;right:0;top:50%;
    height:1px;background:rgba(0,0,0,.5);
  }
  .reveal-actions{display:flex;gap:8px;margin-left:auto;}
  .icon-btn{
    background:#232b36;
    color:var(--text);
    padding:9px 14px;
  }
  .icon-btn:hover{background:#2a3340;}

  /* ---- Manifest (list) ---- */
  .manifest{margin-top:44px;}
  .manifest-head{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--text-dim);
    display:grid;
    grid-template-columns:1fr 100px 90px 70px;
    gap:10px;
    padding:0 6px 10px;
    border-bottom:1px solid var(--panel-edge);
  }
  .flight-row{
    display:grid;
    grid-template-columns:1fr 100px 90px 70px;
    gap:10px;
    align-items:center;
    padding:14px 6px;
    border-bottom:1px solid #1f2731;
    font-size:13.5px;
  }
  .flight-row:hover{background:rgba(255,255,255,.015);}
  .origin{
    color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .origin a{color:var(--teal);text-decoration:none;font-family:var(--mono);}
  .origin a:hover{text-decoration:underline;}
  .gate-code{font-family:var(--mono);color:var(--flap-amber);}
  .clicks{font-family:var(--mono);color:var(--text-dim);display:flex;align-items:center;gap:6px;}
  .clicks button{background:none;color:var(--text-dim);padding:2px 6px;font-size:13px;}
  .clicks button:hover{color:var(--teal);}
  .row-actions{display:flex;gap:6px;justify-content:flex-end;}
  .row-actions button{background:none;color:var(--text-dim);padding:4px 8px;font-size:13px;}
  .row-actions button:hover{color:var(--danger);}
  .empty{
    padding:30px 6px;color:var(--text-dim);font-size:13.5px;font-family:var(--mono);
  }
</style>
</head>
<body>
<div class="wrap">

  <p class="eyebrow">Track 5 · outbound links</p>
  <h1>Feed it a long URL.<br>Catch a short one on the next flap.</h1>
  <p class="sub">Paste a URL below, hit depart, and it'll get a gate code you can share, track, and retire whenever you're done with it.</p>

  <div class="board">
    <div class="board-label"><span>Departures</span><span id="server-hint">same origin</span></div>
    <div class="row-form">
      <input type="text" id="url-input" placeholder="https://example.com/a/very/long/path?with=params" autocomplete="off">
      <button class="depart-btn" id="depart-btn">Depart</button>
    </div>
    <div class="status-line" id="status-line"></div>

    <div class="reveal" id="reveal">
      <span class="gate-label">Gate</span>
      <div class="flaps" id="flaps"></div>
      <div class="reveal-actions">
        <button class="icon-btn" id="copy-btn">Copy</button>
        <button class="icon-btn" id="open-btn">Open</button>
      </div>
    </div>
  </div>

  <div class="manifest">
    <div class="manifest-head">
      <span>Origin</span><span>Gate</span><span>Clicks</span><span></span>
    </div>
    <div id="manifest-body"></div>
  </div>

</div>

<script>
const STORAGE_KEY = 'url_departures_board';
const els = {
  input: document.getElementById('url-input'),
  departBtn: document.getElementById('depart-btn'),
  status: document.getElementById('status-line'),
  reveal: document.getElementById('reveal'),
  flaps: document.getElementById('flaps'),
  copyBtn: document.getElementById('copy-btn'),
  openBtn: document.getElementById('open-btn'),
  manifestBody: document.getElementById('manifest-body'),
};

let board = loadBoard();
let lastShortUrl = null;

function loadBoard(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }catch(e){ return []; }
}
function saveBoard(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(board));
}

function setStatus(msg, kind){
  els.status.textContent = msg || '';
  els.status.className = 'status-line' + (kind ? ' ' + kind : '');
}

function renderManifest(){
  if(board.length === 0){
    els.manifestBody.innerHTML = '<div class="empty">No departures yet. Shorten a link above to see it listed here.</div>';
    return;
  }
  els.manifestBody.innerHTML = board.map((item, idx) => `
    <div class="flight-row" data-idx="${idx}">
      <div class="origin" title="${escapeHtml(item.original_url)}">
        <a href="${escapeHtml(item.short_url)}" target="_blank" rel="noopener">${escapeHtml(item.short_code)}</a>
        &nbsp;—&nbsp;${escapeHtml(truncate(item.original_url, 46))}
      </div>
      <div class="gate-code">${escapeHtml(item.short_code)}</div>
      <div class="clicks" data-code="${escapeHtml(item.short_code)}">
        <span class="click-count">${item.clicks ?? '—'}</span>
        <button class="refresh-btn" title="Check clicks">↻</button>
      </div>
      <div class="row-actions">
        <button class="copy-row-btn" title="Copy link">⧉</button>
        <button class="delete-row-btn" title="Delete">✕</button>
      </div>
    </div>
  `).join('');
}

function truncate(str, n){
  return str.length > n ? str.slice(0, n - 1) + '…' : str;
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

function flapReveal(code){
  els.flaps.innerHTML = '';
  const chars = code.split('');
  const tiles = chars.map(() => {
    const tile = document.createElement('div');
    tile.className = 'flap';
    tile.textContent = '·';
    els.flaps.appendChild(tile);
    return tile;
  });
  const scrambleChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  tiles.forEach((tile, i) => {
    let ticks = 6 + i * 2;
    const interval = setInterval(() => {
      if(ticks <= 0){
        tile.textContent = chars[i];
        clearInterval(interval);
      } else {
        tile.textContent = scrambleChars[Math.floor(Math.random() * scrambleChars.length)];
        ticks--;
      }
    }, 40);
  });
  els.reveal.classList.add('show');
}

async function shortenUrl(url){
  const res = await fetch('/shorten', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url})
  });
  let data = {};
  try { data = await res.json(); } catch(e) {}
  if(!res.ok){
    throw new Error(data.message || data.error || `Request failed (${res.status})`);
  }
  return data;
}

async function fetchClicks(code){
  const res = await fetch(`/analytics/${encodeURIComponent(code)}`);
  if(!res.ok) throw new Error('Could not fetch analytics');
  return res.json();
}

async function deleteCode(code){
  const res = await fetch(`/delete/${encodeURIComponent(code)}`, {method:'DELETE'});
  let data = {};
  try { data = await res.json(); } catch(e) {}
  if(!res.ok) throw new Error(data.message || 'Could not delete');
  return data;
}

els.departBtn.addEventListener('click', async () => {
  const url = els.input.value.trim();
  if(!url){
    setStatus('Enter a URL first.', 'err');
    return;
  }
  els.departBtn.disabled = true;
  els.departBtn.textContent = 'Departing…';
  setStatus('');
  try{
    const data = await shortenUrl(url);
    if(!data.short_code){
      setStatus(data.message || 'Already on the board.', 'ok');
    } else {
      setStatus('Departed. Gate assigned below.', 'ok');
      flapReveal(data.short_code);
      lastShortUrl = data.short_url;
      els.openBtn.onclick = () => window.open(data.short_url, '_blank');
      els.copyBtn.onclick = () => copyText(data.short_url, els.copyBtn);

      const existing = board.find(b => b.short_code === data.short_code);
      if(!existing){
        board.unshift({
          original_url: url,
          short_code: data.short_code,
          short_url: data.short_url,
          clicks: 0
        });
        saveBoard();
        renderManifest();
      }
    }
    els.input.value = '';
  }catch(err){
    setStatus(err.message, 'err');
  }finally{
    els.departBtn.disabled = false;
    els.departBtn.textContent = 'Depart';
  }
});

els.input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') els.departBtn.click();
});

function copyText(text, btn){
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = original, 1200);
  });
}

els.manifestBody.addEventListener('click', async (e) => {
  const row = e.target.closest('.flight-row');
  if(!row) return;
  const idx = Number(row.dataset.idx);
  const item = board[idx];
  if(!item) return;

  if(e.target.classList.contains('refresh-btn')){
    e.target.disabled = true;
    try{
      const data = await fetchClicks(item.short_code);
      item.clicks = data.clicks;
      saveBoard();
      renderManifest();
    }catch(err){
      setStatus(err.message, 'err');
    }
  }

  if(e.target.classList.contains('copy-row-btn')){
    copyText(item.short_url, e.target);
  }

  if(e.target.classList.contains('delete-row-btn')){
    try{
      await deleteCode(item.short_code);
      board.splice(idx, 1);
      saveBoard();
      renderManifest();
    }catch(err){
      setStatus(err.message, 'err');
    }
  }
});

renderManifest();
</script>
</body>
</html>
